# E2E Stagehand tests: runs against the feltsense portal with local Supabase.
# Requires: FELTSENSE_REPO (vars), FELTSENSE_PAT (secret), PORTAL_*, OPENAI_API_KEY.
# VITE_SUPABASE_* are set from `supabase status -o env` and exported via $GITHUB_ENV for later steps (no manual anon key needed).

name: E2E Stagehand Tests

on:
  # Allow this workflow to be called from other workflows in this
  # repo or other repos (via `uses: <repo>/.github/workflows/e2e-stagehand.yml@ref`)
  workflow_call:

  # Allow external repos (e.g. felt-sense-2.0) to trigger this via
  # the GitHub REST API `repository_dispatch` event.
  repository_dispatch:
    types:
      - e2e-stagehand

  # Optional manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Repository containing the portal app (with supabase/ and Vite dev server).
  # Set in repo Settings → Variables: e.g. "myorg/felt-sense-2.0" or "myorg/feltsense".
  FELTSENSE_REPO: ${{ vars.FELTSENSE_REPO }}
  # Path within that repo to the app (package.json with "dev" script and supabase/).
  # Use "." if the repo root is the app; use "app/felt-sense-2.0" for a monorepo.
  FELTSENSE_APP_PATH: ${{ vars.FELTSENSE_APP_PATH || '.' }}

jobs:
  e2e:
    name: E2E Stagehand
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout linear-stagehand-tests
        uses: actions/checkout@v4

      - name: Checkout feltsense repo
        if: env.FELTSENSE_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FELTSENSE_REPO }}
          token: ${{ secrets.FELTSENSE_PAT }}
          path: feltsense-app
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies (linear-stagehand-tests)
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install portal dependencies and start Supabase
        if: env.FELTSENSE_REPO != ''
        working-directory: feltsense-app/${{ env.FELTSENSE_APP_PATH }}
        run: |
          bun install --frozen-lockfile
          bunx supabase --version || true
          bunx supabase start
          # Export Supabase API URL and anon key for later steps (e.g. Vite dev server)
          eval "$(bunx supabase status -o env)" || {
            echo "::error::Failed to read Supabase status env. Is Supabase running?"
            exit 1
          }
          {
            echo "VITE_SUPABASE_URL=${API_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
          } >> "$GITHUB_ENV"

      - name: Start Supabase functions (edge runtime)
        if: env.FELTSENSE_REPO != ''
        working-directory: feltsense-app/${{ env.FELTSENSE_APP_PATH }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          bunx supabase functions serve --no-verify-jwt &
          sleep 5

      - name: Start portal and run E2E tests
        if: env.FELTSENSE_REPO != ''
        env:
          PORTAL_URL: http://localhost:5173
          PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_USE_MOCK_EMAIL_INBOX: "false"
        run: |
          cd $GITHUB_WORKSPACE
          if [ -f .env ]; then set -a; . ./.env; set +a; fi
          cd feltsense-app/${{ env.FELTSENSE_APP_PATH }}
          bun run dev &
          echo "Waiting for portal at http://localhost:5173..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200; then
              echo "Portal ready."
              break
            fi
            sleep 2
          done
          cd $GITHUB_WORKSPACE
          bun run test:scenarios

      # - name: Skip E2E (FELTSENSE_REPO not set)
      #   if: env.FELTSENSE_REPO == ''
      #   run: |
      #     echo "::warning::E2E tests skipped: FELTSENSE_REPO is not set."
      #     exit 1

      - name: Stop Supabase
        if: always() && env.FELTSENSE_REPO != ''
        working-directory: feltsense-app/${{ env.FELTSENSE_APP_PATH }}
        run: bunx supabase stop --no-backup
        continue-on-error: true
